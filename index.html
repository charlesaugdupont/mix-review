<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MixReview</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231a1a2e'/><text y='72' x='8' font-size='58' font-family='Segoe UI,sans-serif' font-weight='700'><tspan fill='white'>M</tspan><tspan fill='%23ff4d6d'>R</tspan></text></svg>"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ── TOPBAR ── -->
<div id="topbar">
  <div style="display:flex;align-items:center;">
    <h1>Mix<span>Review</span></h1>
  </div>
  <div id="user-area">
    <div id="user-chip">
      <div id="user-avatar"></div>
      <span id="user-name"></span>
    </div>
    <button class="btn ghost" style="padding:4px 10px;font-size:12px;" onclick="doLogout()">Sign out</button>
  </div>
</div>

<!-- ── MAIN LAYOUT ── -->
<div id="layout">
  <div id="sidebar">
    <div id="sidebar-hdr">
      <span>Songs</span>
      <div style="display:flex;gap:5px;align-items:center;">
        <button class="btn ghost" style="padding:4px 9px;font-size:12px;" onclick="openModal('version')">+ Version</button>
        <button class="btn ghost" style="padding:4px 9px;font-size:12px;" onclick="openModal('song')">+ Song</button>
      </div>
    </div>
    <div id="songlist">
      <div class="empty-state"><div class="empty-icon">🎵</div>No songs yet.<br>Upload one to get started.</div>
    </div>
  </div>

  <div id="center">
    <div id="player">
      <div id="player-top">
        <div id="ptitle" style="color:var(--text1);"></div>
        <div id="version-pills"></div>
      </div>
      <div id="waveform-wrap">
        <canvas id="wcanvas"></canvas>
        <div id="playhead"></div>
        <div id="hover-line"></div>
        <div id="hover-tooltip"></div>
        <div id="cdots"></div>
        <div id="wave-loading"></div>
      </div>
      <div id="loop-bar">
        <div id="loop-pill">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 0 0 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
          <span id="loop-range-label">0:00 – 0:00</span>
          <button id="loop-clear" onclick="clearLoop()" title="Clear loop (Esc)">✕</button>
        </div>
        <span id="loop-hint">Press Esc to clear</span>
      </div>
      <div id="pcontrols">
        <button id="playbtn" onclick="togglePlay()">
          <svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
        </button>
        <div id="timedisplay">0:00 / 0:00</div>
        <button id="dlbtn" onclick="downloadVersion()" title="Download current version" style="display:none;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 16l-5-5 1.41-1.41L11 13.17V4h2v9.17l2.59-2.58L17 11l-5 5zm-7 3h14v2H5v-2z"/></svg>
          Download
        </button>
        <div id="volctr">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          <input type="range" min="0" max="1" step="0.01" value="1" oninput="audio.volume=this.value"/>
        </div>
      </div>
    </div>
    <div id="main-area">
      <div id="main-top"></div>
      <div id="comments-area">
        <div class="empty-state"></div>
      </div>
    </div>
  </div>

  <div id="right-panel">
    <div id="cinput">
      <div id="stamprow">
        <div id="stampbadge">@0:00</div>
      </div>
      <div>
        <textarea id="ctext" placeholder="Leave a comment at this timestamp…"></textarea>
      </div>
      <button class="btn" style="width:100%;font-size:13px;padding:9px;" onclick="postComment()">Post Comment</button>
    </div>
  </div>
</div>

<!-- ── LOGIN MODAL ── -->
<div class="modal-bg" id="login-modal">
  <div class="modal">
    <div id="login-logo">Mix<span>Review</span></div>
    <p id="login-subtitle">Members only — sign in to continue.</p>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="" autocomplete="email" />
    <label>Password</label>
    <input type="password" id="login-password" placeholder="" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()" />
    <div id="login-error"></div>
    <div class="modal-btns" style="margin-top:16px;">
      <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
    </div>
  </div>
</div>

<!-- ── UPLOAD MODAL ── -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modal-title">Upload New Song</h2>
    <div id="mf-song">
      <label>Song Title</label>
      <input type="text" id="m-song-title" placeholder="e.g. Taken By The Tide" />
      <label>Version Label</label>
      <input type="text" id="m-song-ver" placeholder="e.g. Demo, V1, Rough Mix" />
    </div>
    <div id="mf-version" style="display:none">
      <label>Song</label>
      <select id="m-song-sel"></select>
      <label>Version Label</label>
      <input type="text" id="m-ver-label" placeholder="e.g. FINAL_MIX_V3" />
    </div>
    <label>Audio File <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0;">(MP3 recommended)</span></label>
    <input type="file" id="m-file" accept="audio/*" />
    <div id="uprog"></div>
    <div class="modal-btns">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="doUpload()">Upload</button>
    </div>
  </div>
</div>

<!-- ── CONFIRM MODAL ── -->
<div class="modal-bg" id="confirm-modal">
  <div class="modal">
    <h2 id="confirm-title">Are you sure?</h2>
    <p id="confirm-msg"></p>
    <div class="modal-btns">
      <button class="btn ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn danger" onclick="runConfirm()">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<audio id="audio" preload="metadata"></audio>

<script src="js/main.js"></script>
</body>
</html>
