<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MixReview</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231a1a2e'/><text y='72' x='8' font-size='58' font-family='Segoe UI,sans-serif' font-weight='700'><tspan fill='white'>M</tspan><tspan fill='%23ff4d6d'>R</tspan></text></svg>"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --bg:        #0f1117;
  --bg2:       #161b27;
  --bg3:       #1e2535;
  --bg4:       #252d40;
  --border:    #2a3347;
  --border2:   #3a4560;
  --text:      #e8eaf0;
  --text2:     #9ba3b8;
  --text3:     #5a6480;
  --accent:    #ff4d6d;
  --accent2:   #ff6b35;
  --accent-bg: rgba(255,77,109,0.12);
  --green:     #4ade80;
  --green-bg:  rgba(74,222,128,0.10);
  --blue:      #60a5fa;
  --blue-bg:   rgba(96,165,250,0.10);
  --yellow:    #fbbf24;
  --radius:    10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ── */
#topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  height: 52px;
}
#topbar h1 {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}
#topbar h1 span { color: var(--accent); }
.topbar-sub {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  letter-spacing: 0.3px;
  margin-left: 10px;
  padding: 2px 8px;
  background: var(--bg3);
  border-radius: 20px;
  border: 1px solid var(--border);
}

/* ── BUTTONS ── */
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  transition: all .15s;
  letter-spacing: 0.2px;
}
.btn:hover { background: #e03558; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,77,109,0.3); }
.btn:active { transform: translateY(0); }
.btn.ghost {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
}
.btn.ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); transform: none; box-shadow: none; }
.btn.sm { padding: 4px 10px; font-size: 11px; }
.btn.danger { background: transparent; border: 1px solid #4a1a22; color: #e05070; }
.btn.danger:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: none; box-shadow: none; }
.btn.green { background: var(--green); color: #0a1a0a; }
.btn.green:hover { background: #22c55e; box-shadow: 0 4px 12px rgba(74,222,128,0.3); }

/* ── LAYOUT ── */
#layout { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
#sidebar {
  width: 250px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
#sidebar-hdr {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg3);
}
#sidebar-hdr span {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  font-weight: 700;
}
#songlist { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 3px; }

.sitem {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all .15s;
  user-select: none;
  border: 1px solid transparent;
}
.sitem:hover { background: var(--bg3); border-color: var(--border); }
.sitem.active {
  background: var(--accent-bg);
  border-color: rgba(255,77,109,0.35);
}
.sitem.active .stitle { color: var(--accent); }
.sitem.drag-over { border-top: 2px solid var(--accent); }
.drag-handle { color: var(--text3); font-size: 13px; cursor: grab; flex-shrink: 0; opacity: 0.5; }
.drag-handle:active { cursor: grabbing; }
.sthumb {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--bg4), var(--bg3));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.sitem.active .sthumb {
  background: linear-gradient(135deg, rgba(255,77,109,0.25), rgba(255,77,109,0.1));
  border-color: rgba(255,77,109,0.3);
}
.stitle {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text2);
}

/* ── CENTER ── */
#center { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── PLAYER ── */
#player {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  flex-shrink: 0;
}
#player-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
#ptitle {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text3);
}

/* ── VERSION PILLS ── */
#version-pills { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.vpill {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 4px 13px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  letter-spacing: 0.4px;
  font-family: inherit;
}
.vpill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.vpill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(255,77,109,0.35);
}

/* ── WAVEFORM ── */
#waveform-wrap {
  position: relative;
  height: 76px;
  background: var(--bg);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: crosshair;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
#wcanvas { width: 100%; height: 100%; display: block; }
#playhead {
  position: absolute;
  top: 0;
  left: 0;
  width: 2px;
  height: 100%;
  background: #fff;
  pointer-events: none;
  box-shadow: 0 0 6px rgba(255,255,255,0.4);
}
#hover-line {
  position: absolute;
  top: 0;
  width: 1px;
  height: 100%;
  background: rgba(255,255,255,0.2);
  pointer-events: none;
  display: none;
}
#hover-tooltip {
  position: absolute;
  top: 6px;
  background: rgba(15,17,23,0.9);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 7px;
  border-radius: 5px;
  pointer-events: none;
  display: none;
  white-space: nowrap;
  transform: translateX(-50%);
  border: 1px solid var(--border2);
}
#cdots { position: absolute; inset: 0; pointer-events: none; }
.cdot {
  position: absolute;
  bottom: 6px;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  transform: translateX(-50%);
  pointer-events: all;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  z-index: 10;
}
.cdot:hover {
  transform: translateX(-50%) scale(1.4);
}
#wave-loading {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text3);
  pointer-events: none;
  background: var(--bg);
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* ── PLAYER CONTROLS ── */
#pcontrols { display: flex; align-items: center; gap: 12px; }
#playbtn {
  width: 38px;
  height: 38px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  padding: 0;
  box-shadow: 0 3px 10px rgba(255,77,109,0.4);
}
#playbtn:hover { background: #e03558; transform: scale(1.08); box-shadow: 0 4px 16px rgba(255,77,109,0.5); }
#playbtn svg { width: 15px; height: 15px; fill: #fff; display: block; }
#timedisplay {
  font-size: 12px;
  color: var(--text2);
  min-width: 90px;
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  background: var(--bg3);
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
#dlbtn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 6px 11px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
  font-family: inherit;
  transition: all .15s;
  white-space: nowrap;
}
#dlbtn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
#dlbtn.loading { opacity: 0.5; pointer-events: none; }
#volctr { display: flex; align-items: center; gap: 7px; margin-left: auto; color: var(--text3); }
input[type=range] {
  -webkit-appearance: none;
  height: 4px;
  background: var(--bg4);
  border-radius: 2px;
  cursor: pointer;
  outline: none;
  width: 72px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 4px rgba(255,77,109,0.5);
}

/* ── MAIN AREA ── */
#main-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
#main-top {
  padding: 10px 20px 0;
  font-size: 11px;
  color: var(--text3);
  flex-shrink: 0;
  font-weight: 600;
  letter-spacing: 0.3px;
}
#comments-area {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── RIGHT PANEL ── */
#right-panel {
  width: 300px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
#rp-hdr {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  font-weight: 700;
  background: var(--bg3);
}
#cinput { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
#stamprow { display: flex; align-items: center; gap: 8px; }
#stampbadge {
  background: var(--accent-bg);
  border: 1.5px solid rgba(255,77,109,0.4);
  color: var(--accent);
  font-size: 13px;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 800;
  letter-spacing: 0.3px;
  font-variant-numeric: tabular-nums;
}
.input-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: -4px;
}
#cinput input, #cinput textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 8px 11px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  transition: border-color .15s;
}
#cinput textarea { resize: vertical; min-height: 250px; line-height: 1.5; }
#cinput input:focus, #cinput textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,77,109,0.1); }
#cinput input::placeholder, #cinput textarea::placeholder { color: var(--text3); }

/* ── COMMENT CARDS ── */
.ccard {
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  transition: all .15s;
  position: relative;
}
.ccard:hover { border-color: var(--border2); border-left-color: var(--border2); background: var(--bg3); }
.ccard.hl {
  border-left-color: var(--accent);
  border-color: rgba(255,77,109,0.3);
  background: rgba(255,77,109,0.06);
}
.ccard.resolved { opacity: 0.45; }
.ccard-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
  gap: 8px;
}
.cauthor {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.ctsbadge {
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  box-shadow: 0 2px 6px rgba(255,77,109,0.3);
  transition: all .15s;
}
.ctsbadge:hover { background: #e03558; transform: scale(1.05); }
.ctext { font-size: 13px; color: var(--text2); line-height: 1.6; word-break: break-word; }
.ctext.editing { display: none; }
.cedit-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--accent);
  color: var(--text);
  padding: 6px 9px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  min-height: 50px;
  display: none;
  margin-bottom: 5px;
  box-shadow: 0 0 0 3px rgba(255,77,109,0.1);
}
.cdate { font-size: 11px; color: var(--text3); margin-top: 5px; font-weight: 500; }
.cactions {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
  flex-wrap: wrap;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.cact-btn {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  padding: 3px 7px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all .15s;
}
.cact-btn:hover { color: var(--text2); background: var(--bg4); }
.cact-btn svg { color: var(--text3); transition: all .15s; }
.cact-btn.has-likes svg { color: var(--accent); }
.cact-btn:hover svg { color: var(--accent); transform: scale(1.15); }
.cact-btn.liked svg { color: var(--accent); filter: drop-shadow(0 0 3px rgba(255,77,109,0.5)); }
.cact-btn.liked { color: var(--accent); }
.cact-btn.resolved-btn { color: var(--green); }
.cact-btn.resolved-btn:hover { background: var(--green-bg); color: var(--green); }

.cact-btn.delete-btn { margin-left: auto; color: var(--border2); }
.cact-btn.delete-btn:hover { color: var(--accent); background: var(--accent-bg); }
.cact-btn.delete-btn:hover svg { color: var(--accent); transform: none; }
.cact-btn.reply-delete-btn { margin-left: auto; color: var(--border); }
.cact-btn.reply-delete-btn:hover { color: var(--accent); background: var(--accent-bg); }
.cact-btn.reply-delete-btn:hover svg { color: var(--accent); transform: none; }

/* ── REPLIES ── */
.replies {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.reply-card {
  background: var(--bg3);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-left: 2px solid var(--border2);
}
.reply-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 3px;
}
.reply-author { font-size: 12px; font-weight: 700; color: var(--text2); }
.reply-date { font-size: 10px; color: var(--text3); font-weight: 500; }
.reply-text { font-size: 13px; color: var(--text2); line-height: 1.6; word-break: break-word; }
.reply-edit-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--accent);
  color: var(--text);
  padding: 4px 7px;
  border-radius: 4px;
  font-size: 11px;
  font-family: inherit;
  resize: vertical;
  display: none;
  margin-bottom: 4px;
}
.reply-actions { display: flex; gap: 4px; margin-top: 5px; align-items: center; }
.reply-input-wrap { display: none; margin-top: 8px; }
.reply-input-row { display: flex; gap: 6px; }
.reply-input-row input {
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 6px 9px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: inherit;
  transition: border-color .15s;
}
.reply-input-row input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,77,109,0.1); }
.reply-input-row input::placeholder { color: var(--text3); }

/* ── SECTION DIVIDERS ── */
.section-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.2px;
}
.section-divider::before, .section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── MODALS ── */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(4px);
  z-index: 50;
  align-items: center;
  justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 28px;
  width: 440px;
  max-width: 95vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.modal h2 { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
.modal label {
  font-size: 11px;
  color: var(--text3);
  display: block;
  margin-bottom: 4px;
  margin-top: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.modal input[type=text], .modal select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  transition: border-color .15s;
}
.modal input[type=text]:focus, .modal select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,77,109,0.1); }
.modal select { color: var(--text2); }
.modal select option { background: var(--bg2); }
.modal input[type=file] {
  width: 100%;
  background: var(--bg);
  border: 2px dashed var(--border2);
  color: var(--text3);
  padding: 20px;
  border-radius: var(--radius);
  font-size: 12px;
  cursor: pointer;
  margin-top: 4px;
  transition: border-color .15s;
  font-family: inherit;
}
.modal input[type=file]:hover { border-color: var(--accent); color: var(--text2); }
.modal-btns { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
#uprog { font-size: 12px; color: var(--accent); margin-top: 10px; min-height: 18px; font-weight: 600; }
#confirm-modal .modal { width: 360px; }
#confirm-modal p { font-size: 13px; color: var(--text2); margin-top: 10px; line-height: 1.5; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 18px;
  right: 18px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  display: none;
  z-index: 99;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
#toast.show { display: block; animation: slideUp .2s ease; }
@keyframes slideUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

/* ── EMPTY STATES ── */
.empty-state {
  color: var(--text3);
  font-size: 13px;
  text-align: center;
  padding: 40px 20px;
  font-weight: 500;
  line-height: 1.6;

<script>
var sb = null, songs = [], vers = {}, comms = [], curSong = null, curVer = null, curTs = 0, raf = null;
var audio = document.getElementById('audio');
var ICON_PLAY  = '<polygon points="6,3 20,12 6,21"/>';
var ICON_PAUSE = '<rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>';
var ICON_HEART = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
var ICON_TRASH = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3h6l1 1h4v2H4V4h4L9 3zm-3 5h12l-1 13H7L6 8zm5 2v9h1v-9h-1zm3 0v9h1v-9h-1z"/></svg>';
var ICON_REPLY = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>';

var confirmCallback = null, dragIdx = null, hlId = null, waveCache = {};
var waveAnimFrame = null, waveAnimStart = null, WAVE_ANIM_DURATION = 600;
var autoPlayNext = false;

function setPlayIcon(p) { document.getElementById('play-icon').innerHTML = p ? ICON_PAUSE : ICON_PLAY; }

document.addEventListener('keydown', function(e) {
  if (e.code !== 'Space') return;
  var tag = document.activeElement ? document.activeElement.tagName : '';
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || (document.activeElement && document.activeElement.isContentEditable)) return;
  e.preventDefault(); togglePlay();
});

var waveWrap     = document.getElementById('waveform-wrap');
var hoverLine    = document.getElementById('hover-line');
var hoverTooltip = document.getElementById('hover-tooltip');

waveWrap.addEventListener('mousemove', function(e) {
  if (!audio.duration) return;
  var r = waveWrap.getBoundingClientRect(), x = e.clientX - r.left;
  hoverLine.style.left = x + 'px'; hoverLine.style.display = 'block';
  var tipX = Math.min(Math.max(x, 28), r.width - 28);
  hoverTooltip.style.left = tipX + 'px';
  hoverTooltip.textContent = ft((x / r.width) * audio.duration);
  hoverTooltip.style.display = 'block';
});
waveWrap.addEventListener('mouseleave', function() { hoverLine.style.display = 'none'; hoverTooltip.style.display = 'none'; });
waveWrap.addEventListener('click', function(e) { seekTo(e); });

const SUPABASE_URL = "https://nxmodpianwotdvpixjqp.supabase.co";
const SUPABASE_KEY = "sb_publishable_iBK75q4oIOK25ph5VWJRYg_lxz2QwEM";

function connect(url, key) {
  if (!url || !key) { toast('Enter URL and key'); return; }
  sb = window.supabase.createClient(url, key);
  loadSongs();
}
window.onload = function() { connect(SUPABASE_URL, SUPABASE_KEY); handleMobileUI(); };

// ── SONGS ──────────────────────────────────────────────────────────────────
async function loadSongs() {
  var r = await sb.from('songs').select('*').order('sort_order',{ascending:true}).order('created_at');
  if (r.error) { toast('Error: '+r.error.message); return; }
  songs = r.data || []; renderSongs();
  if (songs.length && !curSong) pickSong(songs[0].id);
}
async function loadVers(sid) {
  var r = await sb.from('versions').select('*').eq('song_id',sid).order('created_at',{ascending:true});
  vers[sid] = r.data || []; return vers[sid];
}
async function loadComms(vid) {
  var r = await sb.from('comments').select('*').eq('version_id',vid).order('timestamp_sec');
  comms = r.data || []; renderComments(); renderDots();
}

function renderSongs() {
  var el = document.getElementById('songlist');
  if (!songs.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎵</div>No songs yet.<br>Upload one to get started.</div>';
    return;
  }
  el.innerHTML = songs.map(function(s,i){
    return '<div class="sitem'+(curSong&&curSong.id===s.id?' active':'')+'" draggable="true" data-id="'+s.id+'" '
      +'ondragstart="dragStart(event,'+i+')" ondragover="dragOver(event)" ondrop="dragDrop(event,'+i+')" ondragleave="dragLeave(event)" '
      +'onclick="handleSongClick(event,\''+s.id+'\')">'
      +'<span class="drag-handle">&#8942;&#8942;</span>'
      +'<div class="sthumb">&#127925;</div>'
      +'<div style="min-width:0;flex:1"><div class="stitle">'+esc(s.title)+'</div></div>'
      +'</div>';
  }).join('');
}

function renderVersionPills(vl, activeId) {
  var el = document.getElementById('version-pills');
  if (!vl||!vl.length) { el.innerHTML=''; return; }
  el.innerHTML = vl.map(function(v){
    return '<button class="vpill'+(v.id===activeId?' active':'')+'" onclick="loadVersion(\''+v.id+'\')">'+esc(v.label)+'</button>';
  }).join('');
}

function handleSongClick(e,sid) { if(e.target.classList.contains('drag-handle')) return; pickSong(sid); }

function dragStart(e,i) { dragIdx=i; e.dataTransfer.effectAllowed='move'; }
function dragOver(e)    { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e)   { e.currentTarget.classList.remove('drag-over'); }
function dragDrop(e,toIdx) {
  e.currentTarget.classList.remove('drag-over');
  if (dragIdx===null||dragIdx===toIdx) return;
  var moved=songs.splice(dragIdx,1)[0]; songs.splice(toIdx,0,moved); dragIdx=null; renderSongs();
  songs.forEach(function(s,i){ sb.from('songs').update({sort_order:i}).eq('id',s.id); });
}

async function pickSong(sid) {
  curSong = songs.find(function(s){return s.id===sid;});
  var vl = await loadVers(sid); renderSongs();
  document.getElementById('ptitle').textContent = curSong.title;
  document.getElementById('ptitle').style.color = '';
  if (vl.length) { renderVersionPills(vl,vl[0].id); loadVersion(vl[0].id); }
  else renderVersionPills([],null);
}

async function loadVersion(vid) {
  if (!curSong) return;
  var vl = vers[curSong.id]||[];
  var v = vl.find(function(x){return x.id===vid;}); if(!v) return;
  curVer = v; audio.src = v.file_url; audio.load();
  setPlayIcon(false);
  document.getElementById('timedisplay').textContent = '0:00 / 0:00';
  document.getElementById('playhead').style.left = '0';
  document.getElementById('dlbtn').style.display = 'flex';
  renderVersionPills(vl, vid); clearWaveCanvas();
  if (waveCache[vid]) animateWaveIn(waveCache[vid]);
  else { setWaveLoading(true); decodeAndCacheWave(vid, v.file_url); }
  if (autoPlayNext) {
    autoPlayNext = false;
    audio.addEventListener('canplay', function(){ audio.play(); setPlayIcon(true); tick(); }, {once:true});
  }
  await loadComms(vid);
}

function isMobile() { return window.innerWidth < 900; }
window.addEventListener('resize', handleMobileUI);
function handleMobileUI() { document.getElementById('right-panel').style.display = isMobile()?'none':'flex'; }

// ── WAVEFORM ──────────────────────────────────────────────────────────────
function setWaveLoading(on) {
  var el=document.getElementById('wave-loading'); el.textContent=on?'Analysing waveform...':''; el.style.display=on?'flex':'none';
}
function clearWaveCanvas() {
  if(waveAnimFrame){cancelAnimationFrame(waveAnimFrame);waveAnimFrame=null;}
  var c=document.getElementById('wcanvas'),ctx=c.getContext('2d');
  c.width=c.offsetWidth; c.height=c.offsetHeight; ctx.clearRect(0,0,c.width,c.height);
}
async function decodeAndCacheWave(vid,url) {
  try {
    var resp=await fetch(url), buf=await resp.arrayBuffer();
    var actx=new(window.AudioContext||window.webkitAudioContext)();
    var abuf=await actx.decodeAudioData(buf); actx.close();
    var BARS=250,nc=abuf.numberOfChannels,len=abuf.length;
    var chs=[]; for(var ch=0;ch<nc;ch++) chs.push(abuf.getChannelData(ch));
    var STEP=4,ml=Math.ceil(len/STEP),mono=new Float32Array(ml);
    for(var i=0;i<ml;i++){var idx=i*STEP,s=0;for(var ch=0;ch<nc;ch++)s+=chs[ch][idx];mono[i]=s/nc;}
    var spb=Math.floor(ml/BARS),peaks=new Float32Array(BARS);
    for(var b=0;b<BARS;b++){var st=b*spb,rs=0;for(var s=0;s<spb;s++){var vv=mono[st+s];rs+=vv*vv;}peaks[b]=Math.sqrt(rs/spb);}
    var mp=0; for(var i=0;i<BARS;i++) if(peaks[i]>mp) mp=peaks[i];
    if(mp>0) for(var i=0;i<BARS;i++) peaks[i]/=mp;
    waveCache[vid]=peaks; setWaveLoading(false);
    if(curVer&&curVer.id===vid) animateWaveIn(peaks);
  } catch(err) { setWaveLoading(false); console.warn('Wave decode failed:',err); drawWaveFallback(); }
}
function easeOutCubic(t){return 1-Math.pow(1-t,3);}
function animateWaveIn(peaks) {
  if(waveAnimFrame){cancelAnimationFrame(waveAnimFrame);waveAnimFrame=null;}
  waveAnimStart=null;
  function frame(ts){
    if(!waveAnimStart) waveAnimStart=ts;
    var prog=Math.min((ts-waveAnimStart)/WAVE_ANIM_DURATION,1);
    drawWaveFromPeaks(peaks,easeOutCubic(prog));
    if(prog<1) waveAnimFrame=requestAnimationFrame(frame); else waveAnimFrame=null;
  }
  waveAnimFrame=requestAnimationFrame(frame);
}
function drawWaveFromPeaks(peaks,scale) {
  if(scale===undefined) scale=1;
  var c=document.getElementById('wcanvas'),ctx=c.getContext('2d');
  c.width=c.offsetWidth; c.height=c.offsetHeight;
  var bars=peaks.length,bw=c.width/bars,midY=c.height/2;
  var pf=(curVer&&audio.duration)?(audio.currentTime/audio.duration):0;
  ctx.clearRect(0,0,c.width,c.height);
  for(var i=0;i<bars;i++){
    var h=Math.max(2*scale,peaks[i]*c.height*0.88*scale);
    var played = (i/bars < pf);
    // Gradient-like effect: taller bars are brighter
    var alpha = 0.5 + peaks[i] * 0.5;
    if (played) {
      ctx.fillStyle = 'rgba(255,77,109,' + alpha + ')';
    } else {
      ctx.fillStyle = 'rgba(58,69,96,' + (0.4 + peaks[i] * 0.6) + ')';
    }
    var gap = bw > 3 ? 1.5 : 0.5;
    ctx.fillRect(i*bw+gap, midY-h/2, bw-gap*2, h);
  }
}
function drawWaveFallback() {
  var c=document.getElementById('wcanvas'),ctx=c.getContext('2d');
  c.width=c.offsetWidth; c.height=c.offsetHeight;
  var bars=180,bw=c.width/bars; ctx.clearRect(0,0,c.width,c.height);
  for(var i=0;i<bars;i++){var h=(0.15+Math.random()*0.75)*c.height;ctx.fillStyle='rgba(42,51,71,0.8)';ctx.fillRect(i*bw+1,(c.height-h)/2,bw-2,h);}
}
function redrawWaveProgress() {
  if(!waveAnimFrame&&curVer&&waveCache[curVer.id]) drawWaveFromPeaks(waveCache[curVer.id],1);
}

// ── PLAYER ────────────────────────────────────────────────────────────────
function togglePlay() {
  if(!audio.src||audio.src===location.href){toast('No audio loaded');return;}
  if(audio.paused){audio.play();setPlayIcon(true);tick();}
  else{audio.pause();setPlayIcon(false);cancelAnimationFrame(raf);}
}
audio.onended = function() {
  setPlayIcon(false); cancelAnimationFrame(raf);
  if(!curSong||songs.length<2) return;
  var idx=songs.findIndex(function(s){return s.id===curSong.id;});
  if(idx>=0&&idx<songs.length-1){autoPlayNext=true;pickSong(songs[idx+1].id);}
};
function tick() { if(!audio.paused){updateHead();raf=requestAnimationFrame(tick);} }
function updateHead() {
  if(!audio.duration) return;
  var p=audio.currentTime/audio.duration;
  document.getElementById('playhead').style.left=(p*100)+'%';
  document.getElementById('timedisplay').textContent=ft(audio.currentTime)+' / '+ft(audio.duration);
  document.getElementById('stampbadge').textContent='@'+ft(audio.currentTime);
  curTs=audio.currentTime; redrawWaveProgress(); hlComment();
}
function seekTo(e) {
  var r=waveWrap.getBoundingClientRect(),p=(e.clientX-r.left)/r.width;
  if(audio.duration){audio.currentTime=p*audio.duration;curTs=audio.currentTime;document.getElementById('stampbadge').textContent='@'+ft(curTs);updateHead();}
}

async function downloadVersion() {
  if(!curVer||!curSong){toast('No version loaded');return;}
  var btn=document.getElementById('dlbtn'); btn.classList.add('loading'); btn.textContent='Downloading…';
  try {
    var resp=await fetch(curVer.file_url); if(!resp.ok) throw new Error('Fetch failed');
    var blob=await resp.blob(),ou=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=ou;
    var ext=curVer.file_url.split('.').pop().split('?')[0]||'mp3';
    a.download=curSong.title+' - '+curVer.label+'.'+ext;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(ou);},10000); toast('Download started!');
  } catch(e) { toast('Download failed.'); console.error(e); }
  finally {
    btn.classList.remove('loading');
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 16l-5-5 1.41-1.41L11 13.17V4h2v9.17l2.59-2.58L17 11l-5 5zm-7 3h14v2H5v-2z"/></svg> Download';
  }
}

// ── COMMENTS ──────────────────────────────────────────────────────────────
// Assign a consistent hue per author name for avatar colors
var authorColors = {};
var colorPalette = ['#60a5fa','#4ade80','#fbbf24','#a78bfa','#34d399','#f472b6','#fb923c','#38bdf8'];
var colorIdx = 0;
function getAuthorColor(name) {
  if (!authorColors[name]) { authorColors[name] = colorPalette[colorIdx++ % colorPalette.length]; }
  return authorColors[name];
}
function getInitials(name) {
  return name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
}

function renderComments() {
  var el=document.getElementById('comments-area');
  document.getElementById('rp-hdr').textContent='New Comment';
  if(!comms.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">💬</div>No comments yet</div>';
    return;
  }
  var active=comms.filter(function(c){return !c.resolved;});
  var resolved=comms.filter(function(c){return c.resolved;});
  var html=active.map(function(c){return renderCard(c);}).join('');
  if(resolved.length){
    html+='<div class="section-divider">Resolved ('+resolved.length+')</div>';
    html+=resolved.map(function(c){return renderCard(c);}).join('');
  }
  el.innerHTML=html;
}

function renderCard(c) {
  var replies=c.replies?JSON.parse(c.replies):[];
  var likes=c.likes||0, liked=(c.likedBy||'').indexOf(getLiker())>-1;
  var color = getAuthorColor(c.author);

  var repliesHtml='';
  if(replies.length){
    repliesHtml='<div class="replies">'+replies.map(function(r,ri){
      var rLiked=(r.likedBy||'').indexOf(getLiker())>-1, rLikes=r.likes||0;
      var rColor = getAuthorColor(r.author);
      return '<div class="reply-card" id="reply-'+c.id+'-'+ri+'">'
        +'<div class="reply-top">'
          +'<div style="display:flex;align-items:center;gap:6px;">'
            +'<div style="width:20px;height:20px;border-radius:50%;background:'+rColor+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#0f1117;flex-shrink:0;">'+getInitials(r.author)+'</div>'
            +'<span class="reply-author" style="color:'+rColor+';">'+esc(r.author)+'</span>'
          +'</div>'
          +'<span class="reply-date">'+new Date(r.created_at).toLocaleDateString()+'</span>'
        +'</div>'
        +'<textarea class="reply-edit-input" id="redit-'+c.id+'-'+ri+'">'+esc(r.text)+'</textarea>'
        +'<div class="reply-text" id="rtext-'+c.id+'-'+ri+'">'+esc(r.text)+'</div>'
        +'<div class="reply-actions">'
          +'<button class="cact-btn'+(rLiked?' liked':'')+(rLikes>0?' has-likes':'')+'" onclick="likeReply(\''+c.id+'\','+ri+')">'+ICON_HEART+(rLikes>0?'<b style="font-size:11px;margin-left:1px;">'+rLikes+'</b>':'')+'</button>'
          +'<button class="cact-btn" onclick="editReply(\''+c.id+'\','+ri+')">Edit</button>'
          +'<button class="cact-btn" style="display:none" id="rsave-'+c.id+'-'+ri+'" onclick="saveReply(\''+c.id+'\','+ri+')">💾 Save</button>'
          +'<button class="cact-btn reply-delete-btn" onclick="deleteReply(\''+c.id+'\','+ri+')" title="Delete reply">'+ICON_TRASH+'</button>'
        +'</div>'
      +'</div>';
    }).join('')+'</div>';
  }

  return '<div class="ccard'+(c.resolved?' resolved':'')+(c.id===hlId?' hl':'')+'" id="cc-'+c.id+'">'
    +'<div class="ccard-top">'
      +'<div style="display:flex;align-items:center;gap:8px;">'
        +'<div style="width:28px;height:28px;border-radius:50%;background:'+color+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0f1117;flex-shrink:0;">'+getInitials(c.author)+'</div>'
        +'<span class="cauthor" style="color:'+color+';">'+esc(c.author)+(c.resolved?' <span style="color:var(--green);font-size:11px;">✓ resolved</span>':'')+'</span>'
      +'</div>'
      +'<span class="ctsbadge" onclick="jumpTo('+c.timestamp_sec+')">@'+ft(c.timestamp_sec)+'</span>'
    +'</div>'
    +'<textarea class="cedit-input" id="cedit-'+c.id+'">'+esc(c.content)+'</textarea>'
    +'<div class="ctext" id="ctext-'+c.id+'">'+esc(c.content)+'</div>'
    +'<div class="cdate">'+new Date(c.created_at).toLocaleDateString()+'</div>'
    +'<div class="cactions">'
      +'<button class="cact-btn'+(liked?' liked':'')+(likes>0?' has-likes':'')+'" onclick="toggleLike(\''+c.id+'\')">'+ICON_HEART+(likes>0?'<b style="font-size:11px;margin-left:1px;">'+likes+'</b>':'')+'</button>'
      +'<button class="cact-btn" onclick="toggleReplyBox(\''+c.id+'\')">'+ICON_REPLY+' Reply</button>'
      +'<button class="cact-btn" id="cedit-btn-'+c.id+'" onclick="editComment(\''+c.id+'\')">Edit</button>'
      +'<button class="cact-btn" style="display:none" id="csave-btn-'+c.id+'" onclick="saveComment(\''+c.id+'\')">💾 Save</button>'
      +'<button class="cact-btn '+(c.resolved?'resolved-btn':'')+'" onclick="toggleResolve(\''+c.id+'\')">'+(c.resolved?'↩ Unresolve':'Resolve')+'</button>'
      +'<button class="cact-btn delete-btn" onclick="deleteComment(\''+c.id+'\')" title="Delete comment">'+ICON_TRASH+'</button>'
    +'</div>'
    +repliesHtml
    +'<div class="reply-input-wrap" id="replybox-'+c.id+'">'
      +'<div class="reply-input-row">'
        +'<input type="text" placeholder="Your name" id="rauthor-'+c.id+'" style="width:90px;flex-shrink:0"/>'
        +'<input type="text" placeholder="Write a reply..." id="rtext-input-'+c.id+'" onkeydown="if(event.key===\'Enter\')submitReply(\''+c.id+'\')" style="flex:1"/>'
        +'<button class="btn sm" onclick="submitReply(\''+c.id+'\')">Post</button>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function renderDots() {
  var el=document.getElementById('cdots'); el.innerHTML='';
  if(!audio.duration){audio.addEventListener('loadedmetadata',renderDots,{once:true});return;}
  comms.filter(function(c){return !c.resolved;}).forEach(function(c){
    var d=document.createElement('div'); d.className='cdot';
    d.style.left=(c.timestamp_sec/audio.duration*100)+'%';
    d.title='@'+ft(c.timestamp_sec)+' · '+c.author+': '+c.content.slice(0,40)+(c.content.length>40?'…':'');
    d.onclick=function(e){e.stopPropagation();jumpTo(c.timestamp_sec);};
    el.appendChild(d);
  });
}

function jumpTo(s) {
  audio.currentTime=s; curTs=s;
  document.getElementById('stampbadge').textContent='@'+ft(s);
  updateHead();
  if(audio.paused){audio.play();setPlayIcon(true);tick();}
}

function hlComment() {
  var n=comms.find(function(c){return Math.abs(c.timestamp_sec-audio.currentTime)<1.5;});
  var newId=n?n.id:null; if(newId===hlId) return;
  hlId=newId; renderComments();
  if(hlId){var e=document.getElementById('cc-'+hlId);if(e)e.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

// ── COMMENT ACTIONS ───────────────────────────────────────────────────────
function getLiker() {
  var n=document.getElementById('cauthor').value.trim();
  return n||(localStorage.getItem('anon_id')||(function(){var id='u'+Date.now();localStorage.setItem('anon_id',id);return id;})());
}

async function deleteComment(cid) {
  var c = comms.find(x => x.id === cid);
  if (!c) return;
  comms = comms.filter(x => x.id !== cid);
  if (hlId === cid) hlId = null;
  renderComments(); renderDots();
  var r = await sb.from('comments').delete().eq('id', cid);
  if (r.error) {
    comms.push(c);
    comms.sort((a,b)=>a.timestamp_sec - b.timestamp_sec);
    renderComments(); renderDots();
    toast('Error deleting comment'); console.error(r.error); return;
  }
  toast('Comment deleted');
}

function deleteReply(cid, ri) {
  var c=comms.find(function(x){return x.id===cid;}); if(!c) return;
  var replies=c.replies?JSON.parse(c.replies):[];
  var r=replies[ri]; if(!r) return;
  showConfirm('Delete reply?', 'Permanently delete the reply by "'+r.author+'"?', async function() {
    replies.splice(ri,1);
    var upd=await sb.from('comments').update({replies:JSON.stringify(replies)}).eq('id',cid);
    if(upd.error){toast('Error: '+upd.error.message);return;}
    c.replies=JSON.stringify(replies); renderComments(); toast('Reply deleted');
  });
}

async function toggleLike(cid) {
  var c=comms.find(function(x){return x.id===cid;}); if(!c) return;
  var liker=getLiker(),likedBy=c.likedBy||'',liked=likedBy.indexOf(liker)>-1;
  var newLikedBy=liked?likedBy.replace(liker+',','').replace(','+liker,'').replace(liker,''):(likedBy?likedBy+','+liker:liker);
  var newLikes=Math.max(0,(c.likes||0)+(liked?-1:1));
  await sb.from('comments').update({likes:newLikes,likedBy:newLikedBy}).eq('id',cid);
  c.likes=newLikes; c.likedBy=newLikedBy; renderComments();
}

async function likeReply(cid,ri) {
  var c=comms.find(function(x){return x.id===cid;}); if(!c) return;
  var replies=c.replies?JSON.parse(c.replies):[], r=replies[ri]; if(!r) return;
  var liker=getLiker(),likedBy=r.likedBy||'',liked=likedBy.indexOf(liker)>-1;
  r.likedBy=liked?likedBy.replace(liker+',','').replace(','+liker,'').replace(liker,''):(likedBy?likedBy+','+liker:liker);
  r.likes=Math.max(0,(r.likes||0)+(liked?-1:1));
  await sb.from('comments').update({replies:JSON.stringify(replies)}).eq('id',cid);
  c.replies=JSON.stringify(replies); renderComments();
}

function toggleReplyBox(cid) {
  var box=document.getElementById('replybox-'+cid); if(!box) return;
  box.style.display=box.style.display==='block'?'none':'block';
  if(box.style.display==='block'){
    var saved=document.getElementById('cauthor').value.trim();
    if(saved) document.getElementById('rauthor-'+cid).value=saved;
    document.getElementById('rtext-input-'+cid).focus();
  }
}

async function submitReply(cid) {
  var c=comms.find(function(x){return x.id===cid;}); if(!c) return;
  var author=document.getElementById('rauthor-'+cid).value.trim();
  var text=document.getElementById('rtext-input-'+cid).value.trim();
  if(!author||!text){toast('Enter name and reply');return;}
  var replies=c.replies?JSON.parse(c.replies):[];
  replies.push({author:author,text:text,likes:0,likedBy:'',created_at:new Date().toISOString()});
  await sb.from('comments').update({replies:JSON.stringify(replies)}).eq('id',cid);
  c.replies=JSON.stringify(replies);
  document.getElementById('rtext-input-'+cid).value='';
  renderComments();
}

function editComment(cid) {
  document.getElementById('ctext-'+cid).classList.add('editing');
  var ed=document.getElementById('cedit-'+cid); ed.style.display='block'; ed.focus();
  document.getElementById('cedit-btn-'+cid).style.display='none';
  document.getElementById('csave-btn-'+cid).style.display='inline-flex';
}
async function saveComment(cid) {
  var newText=document.getElementById('cedit-'+cid).value.trim(); if(!newText) return;
  await sb.from('comments').update({content:newText}).eq('id',cid);
  var c=comms.find(function(x){return x.id===cid;}); if(c) c.content=newText;
  renderComments();
}

function editReply(cid,ri) {
  document.getElementById('rtext-'+cid+'-'+ri).style.display='none';
  document.getElementById('redit-'+cid+'-'+ri).style.display='block';
  document.getElementById('rsave-'+cid+'-'+ri).style.display='inline-flex';
}
async function saveReply(cid,ri) {
  var c=comms.find(function(x){return x.id===cid;}); if(!c) return;
  var replies=c.replies?JSON.parse(c.replies):[];
  var newText=document.getElementById('redit-'+cid+'-'+ri).value.trim(); if(!newText) return;
  replies[ri].text=newText;
  await sb.from('comments').update({replies:JSON.stringify(replies)}).eq('id',cid);
  c.replies=JSON.stringify(replies); renderComments();
}

async function toggleResolve(cid) {
  var c=comms.find(function(x){return x.id===cid;}); if(!c) return;
  var newVal=!c.resolved;
  await sb.from('comments').update({resolved:newVal}).eq('id',cid);
  c.resolved=newVal; renderComments(); renderDots();
}

async function postComment() {
  if(!sb){toast('Not connected');return;}
  if(!curVer){toast('Select a song first');return;}
  var a=document.getElementById('cauthor').value.trim();
  var t=document.getElementById('ctext').value.trim();
  if(!a){toast('Enter your name');return;}
  if(!t){toast('Enter a comment');return;}
  var r=await sb.from('comments').insert({song_id:curSong.id,version_id:curVer.id,author:a,timestamp_sec:curTs,content:t,likes:0,likedBy:'',resolved:false,replies:'[]'});
  if(r.error){toast('Error: '+r.error.message);return;}
  document.getElementById('ctext').value='';
  toast('Comment posted ✓');
  await loadComms(curVer.id);
}

// ── CONFIRM MODAL ─────────────────────────────────────────────────────────
function showConfirm(title,msg,cb) {
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  confirmCallback=cb;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');confirmCallback=null;}
function runConfirm() { const cb=confirmCallback; closeConfirm(); if(cb) cb(); }

// ── UPLOAD ────────────────────────────────────────────────────────────────
var umode='song';
function openModal(m) {
  if(!sb){toast('Connect to Supabase first');return;}
  umode=m;
  document.getElementById('modal-title').textContent=m==='song'?'Upload New Song':'Add Version to Song';
  document.getElementById('mf-song').style.display=m==='song'?'block':'none';
  document.getElementById('mf-version').style.display=m==='version'?'block':'none';
  if(m==='version') document.getElementById('m-song-sel').innerHTML=songs.map(function(s){return '<option value="'+s.id+'">'+esc(s.title)+'</option>';}).join('');
  document.getElementById('uprog').textContent='';
  document.getElementById('m-file').value='';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

async function doUpload() {
  if(!sb) return;
  var file=document.getElementById('m-file').files[0]; if(!file){toast('Select a file');return;}
  var prog=document.getElementById('uprog');
  if(umode==='song'){
    var title=document.getElementById('m-song-title').value.trim(); if(!title){prog.textContent='Enter a title';return;}
    var dup=songs.find(function(s){return s.title.toLowerCase()===title.toLowerCase();});
    if(dup){prog.textContent='A song with this name already exists.';return;}
  } else {
    var sid2=document.getElementById('m-song-sel').value;
    var lbl=document.getElementById('m-ver-label').value.trim(); if(!lbl){prog.textContent='Enter a version label';return;}
    var dupVer=(vers[sid2]||[]).find(function(v){return v.label.toLowerCase()===lbl.toLowerCase();});
    if(dupVer){prog.textContent='A version with this label already exists for this song.';return;}
  }
  prog.textContent='Uploading...';
  var fname=Date.now()+'_'+file.name.replace(/\s+/g,'_');
  var up=await sb.storage.from('audio').upload(fname,file);
  if(up.error){prog.textContent='Failed: '+up.error.message;return;}
  var fileUrl=sb.storage.from('audio').getPublicUrl(fname).data.publicUrl;
  if(umode==='song'){
    var verLabel=document.getElementById('m-song-ver').value.trim()||'V1';
    var sid='song_'+Date.now();
    var sr=await sb.from('songs').insert({id:sid,title:title,sort_order:songs.length});
    if(sr.error){prog.textContent='Error: '+sr.error.message;return;}
    await sb.from('versions').insert({id:'v_'+Date.now(),song_id:sid,label:verLabel,file_url:fileUrl});
    prog.textContent='Song uploaded! 🎉'; await loadSongs();
  } else {
    var vr=await sb.from('versions').insert({id:'v_'+Date.now(),song_id:sid2,label:lbl,file_url:fileUrl});
    if(vr.error){prog.textContent='Error: '+vr.error.message;return;}
    prog.textContent='Version added! ✓';
    if(curSong&&curSong.id===sid2){var vl3=await loadVers(sid2);renderVersionPills(vl3,curVer?curVer.id:vl3[0].id);}
  }
  setTimeout(closeModal,1400);
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function ft(s){if(!s||isNaN(s))return '0:00';return Math.floor(s/60)+':'+(Math.floor(s%60)<10?'0':'')+Math.floor(s%60);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
window.addEventListener('resize',function(){if(curVer&&waveCache[curVer.id])drawWaveFromPeaks(waveCache[curVer.id],1);});
</script>
</body>
</html>
